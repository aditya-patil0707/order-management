name: Dev SonarQube Scan and AI Report

on:
  push:
    branches:
      - dev

  pull_request:
    branches:
      - dev
    types:
      - closed

jobs:
  sonar-report:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: self-hosted

    steps:
      - name: STEP 1 - Checkout code
        uses: actions/checkout@v4

      - name: STEP 2 - Check Java and Maven
        shell: powershell
        run: |
          java -version
          mvn -version

      - name: STEP 3 - Build and run SonarQube scan
        shell: powershell
        run: |
          mvn clean verify sonar:sonar `
            "-Dsonar.projectKey=ordermanagement" `
            "-Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}" `
            "-Dsonar.token=${{ secrets.SONAR_TOKEN }}"

      - name: STEP 4 - Wait for SonarQube background task
        shell: powershell
        run: |
          $reportFile = "target\sonar\report-task.txt"

          if (!(Test-Path $reportFile)) {
            Write-Error "report-task.txt not found"
            exit 1
          }

          $ceTaskId = Select-String -Path $reportFile -Pattern "ceTaskId=" | ForEach-Object {
            $_.Line.Replace("ceTaskId=", "")
          }

          Write-Host "Sonar CE Task ID: $ceTaskId"

          do {
            Start-Sleep -Seconds 5

            $taskResponse = curl.exe -s -u "${{ secrets.SONAR_TOKEN }}:" `
              "${{ secrets.SONAR_HOST_URL }}/api/ce/task?id=$ceTaskId" | ConvertFrom-Json

            $status = $taskResponse.task.status
            Write-Host "Sonar task status: $status"

          } while ($status -eq "PENDING" -or $status -eq "IN_PROGRESS")

          if ($status -ne "SUCCESS") {
            Write-Error "SonarQube analysis failed with status: $status"
            exit 1
          }

      - name: STEP 5 - Export latest Sonar issues JSON
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path .\sonar-report-output

          Remove-Item .\sonar-report-output\sonar-issues.json -ErrorAction SilentlyContinue
          Remove-Item .\sonar-report-output\sonar-issues-report.csv -ErrorAction SilentlyContinue

          curl.exe -u "${{ secrets.SONAR_TOKEN }}:" `
            "${{ secrets.SONAR_HOST_URL }}/api/issues/search?componentKeys=ordermanagement&ps=100" `
            -o .\sonar-report-output\sonar-issues.json

      - name: STEP 6 - Convert JSON to CSV report with Gemini AI solution
        shell: powershell
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:OPENAI_API_KEY)) {
            Write-Error "OPENAI_API_KEY is missing or empty. Check GitHub Secrets."
            exit 1
          }

          Write-Host "API key is available."

          $json = Get-Content .\sonar-report-output\sonar-issues.json -Raw | ConvertFrom-Json

          Write-Host "Latest Sonar issue count:"
          Write-Host $json.total

          $report = @()

          foreach ($issue in $json.issues) {

            $file = $issue.component -replace '^ordermanagement:', ''

            $prompt = @(
              "You are a Java Spring Boot code reviewer."
              "Give a short practical fix for this SonarQube issue."
              "Keep answer within 2 lines."
              "Severity: $($issue.severity)"
              "Type: $($issue.type)"
              "Rule: $($issue.rule)"
              "File: $file"
              "Line: $($issue.line)"
              "Message: $($issue.message)"
            ) -join "`n"

            $body = @{
              contents = @(
                @{
                  parts = @(
                    @{
                      text = $prompt
                    }
                  )
                }
              )
              generationConfig = @{
                temperature = 0.2
                maxOutputTokens = 120
              }
            } | ConvertTo-Json -Depth 10

            try {
              $geminiUrl = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$env:OPENAI_API_KEY"

              $aiResponse = Invoke-RestMethod `
                -Uri $geminiUrl `
                -Method Post `
                -Headers @{
                  "Content-Type" = "application/json"
                } `
                -Body $body

              $aiSolution = $aiResponse.candidates[0].content.parts[0].text
            }
            catch {
              Write-Host "========== GEMINI API ERROR =========="

              if ($_.Exception.Response -ne $null) {
                Write-Host "Status Code:" $_.Exception.Response.StatusCode.value__

                try {
                  $reader = New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream())
                  $errorBody = $reader.ReadToEnd()

                  Write-Host "Gemini Error Body:"
                  Write-Host $errorBody

                  $aiSolution = "AI ERROR: $errorBody"
                }
                catch {
                  Write-Host "Could not read Gemini error body."
                  Write-Host $_.Exception.Message

                  $aiSolution = "AI ERROR: $($_.Exception.Message)"
                }
              }
              else {
                Write-Host "Raw Error:"
                Write-Host $_.Exception.Message

                $aiSolution = "AI ERROR: $($_.Exception.Message)"
              }

              Write-Host "====================================="
            }

            $report += [PSCustomObject]@{
              severity   = $issue.severity
              type       = $issue.type
              rule       = $issue.rule
              status     = $issue.status
              line       = $issue.line
              effort     = $issue.effort
              message    = $issue.message
              file       = $file
              aiSolution = $aiSolution
            }
          }

          $report | Export-Csv .\sonar-report-output\sonar-issues-report.csv `
            -NoTypeInformation `
            -Force

          Get-ChildItem .\sonar-report-output

      - name: STEP 7 - Upload CSV report
        uses: actions/upload-artifact@v4
        with:
          name: sonar-ai-issues-report-${{ github.run_number }}
          path: sonar-report-output/sonar-issues-report.csv